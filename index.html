<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sổ Thu Chi Nhà Thờ Tộc (Bảo Mật)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thêm thư viện icon cho chiếc bút -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h1 class="text-2xl font-bold text-emerald-800 uppercase">Sổ Thu Chi Nhà Thờ Tộc</h1>
            <button id="loginBtn" onclick="toggleLogin()" class="bg-gray-800 text-white px-4 py-2 rounded font-bold hover:bg-gray-900 transition">🔒 Đăng nhập</button>
        </div>

        <div id="adminSection" class="bg-emerald-50 p-4 rounded-lg mb-6 shadow-inner hidden border-2 border-emerald-500">
            <h2 id="formTitle" class="font-bold text-emerald-700 mb-3">Thêm Giao Dịch Mới</h2>
            <input type="hidden" id="editRowId" value="">
            <div class="grid grid-cols-1 md:grid-cols-6 gap-3">
                <input type="date" id="date" class="p-2 border rounded">
                <input type="text" id="content" placeholder="Nội dung" class="p-2 border rounded col-span-2">
                <input type="text" id="person" placeholder="Người thực hiện" class="p-2 border rounded">
                <input type="number" id="amount" placeholder="Số tiền" class="p-2 border rounded">
                <select id="type" class="p-2 border rounded bg-white">
                    <option value="thu">Thu (+)</option>
                    <option value="chi">Chi (-)</option>
                </select>
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="saveData()" class="bg-emerald-600 text-white px-6 py-2 rounded hover:bg-emerald-700 font-bold">Lưu Dữ Liệu</button>
                <button onclick="resetForm()" id="cancelBtn" class="bg-gray-400 text-white px-6 py-2 rounded hidden">Hủy Sửa</button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <div class="flex gap-2">
                <button onclick="fetchData()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded shadow">🔄 Tải lại dữ liệu</button>
            </div>
            
            <!-- Ô TIỀN QUỸ (Lấy từ L1) -->
            <div id="fundDisplay" class="border-2 border-red-500 bg-red-50 px-4 py-2 rounded-lg flex items-center shadow-sm">
                <span class="text-red-700 font-bold mr-2">Tiền quỹ:</span>
                <span id="fundAmount" class="text-red-800 font-extrabold text-lg">0 VNĐ</span>
                <button id="editFundBtn" onclick="updateFundOnSheet()" class="ml-3 text-gray-400 hover:text-red-600 hidden transition">
                    <i class="fas fa-pencil-alt"></i>
                </button>
            </div>
        </div>

        <div id="loading" class="text-blue-600 font-bold hidden animate-pulse mb-4">Đang xử lý...</div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse border bg-white text-sm">
                <thead>
                    <tr class="bg-emerald-600 text-white uppercase">
                        <th class="border p-3 text-left">Ngày</th>
                        <th class="border p-3 text-left">Nội dung</th>
                        <th class="border p-3 text-left">Người thực hiện</th>
                        <th class="border p-3 text-right">Thu</th>
                        <th class="border p-3 text-right">Chi</th>
                        <th class="border p-3 text-right">Số Dư</th>
                        <th id="thAdmin" class="border p-3 text-center hidden">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="data-table"></tbody>
                <tfoot>
                    <tr class="bg-gray-100 font-bold text-lg">
                        <td colspan="5" class="p-3 text-right text-emerald-800">TỔNG SỐ DƯ:</td>
                        <td id="totalBalance" class="p-3 text-right text-emerald-700">0</td>
                        <td id="tfAdmin" class="hidden"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzQpS42mf6cnqXlZszb0S_qZLgDcIgIcCqq-QUlPfhKTNHghKC5PDUzW7Pt0Xn_07S6/exec";
        let isAdmin = false;
        let serverFund = 0; // Biến lưu tiền quỹ từ L1

        function toggleLogin() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('loginBtn').innerText = "🔒 Đăng nhập";
                document.getElementById('adminSection').classList.add('hidden');
                document.getElementById('editFundBtn').classList.add('hidden'); // Ẩn bút
                document.querySelectorAll('[id$="Admin"]').forEach(el => el.classList.add('hidden'));
            } else {
                if (prompt("Mật khẩu quản trị:") === "11111") {
                    isAdmin = true;
                    document.getElementById('loginBtn').innerText = "🔓 Đăng xuất";
                    document.getElementById('adminSection').classList.remove('hidden');
                    document.getElementById('editFundBtn').classList.remove('hidden'); // Hiện bút
                    document.querySelectorAll('[id$="Admin"]').forEach(el => el.classList.remove('hidden'));
                }
            }
            renderTable();
        }

        // Chỉnh sửa tiền quỹ trực tiếp lên ô L1
        async function updateFundOnSheet() {
            if (!isAdmin) return;
            const newAmount = prompt("Nhập số tiền quỹ mới (Ô L1):", serverFund);
            if (newAmount !== null && !isNaN(newAmount)) {
                setLoading(true);
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "updateFund", amount: parseFloat(newAmount) })
                });
                alert("Đã gửi yêu cầu cập nhật Tiền quỹ!");
                setTimeout(fetchData, 2000);
            }
        }

        async function fetchData() {
            setLoading(true);
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                window.globalData = data.transactions;
                serverFund = parseFloat(data.fund) || 0; // Gán tiền quỹ từ server
                renderTable();
            } catch (e) { alert("Lỗi kết nối dữ liệu!"); }
            setLoading(false);
        }

        function renderTable() {
            let html = ''; 
            let balance = serverFund; // Bắt đầu tính số dư từ Tiền quỹ (L1)
            
            document.getElementById('fundAmount').innerText = serverFund.toLocaleString() + " VNĐ";

            (window.globalData || []).forEach(item => {
                const thu = parseFloat(item["Khoản Thu"]) || 0;
                const chi = parseFloat(item["Khoản Chi"]) || 0;
                balance += (thu - chi);
                const dateStr = item["Ngày"] ? new Date(item["Ngày"]).toLocaleDateString('vi-VN') : '';
                
                html += `<tr class="border-b hover:bg-gray-50">
                    <td class="p-3 border">${dateStr}</td>
                    <td class="p-3 border font-medium">${item["Nội dung"]}</td>
                    <td class="p-3 border">${item["Người thực hiện/Người đóng góp"]}</td>
                    <td class="p-3 border text-right text-blue-600">${thu > 0 ? thu.toLocaleString() : '-'}</td>
                    <td class="p-3 border text-right text-red-500">${chi > 0 ? chi.toLocaleString() : '-'}</td>
                    <td class="p-3 border text-right font-bold text-emerald-700">${balance.toLocaleString()}</td>
                    ${isAdmin ? `<td class="p-3 border text-center whitespace-nowrap">
                        <button onclick="editRow('${encodeURIComponent(JSON.stringify(item))}')" class="text-blue-600 font-bold hover:underline mr-2">Sửa</button>
                        <button onclick="deleteRow(${item.row})" class="text-red-600 font-bold hover:underline">Xóa</button>
                    </td>` : ''}
                </tr>`;
            });
            document.getElementById('data-table').innerHTML = html;
            document.getElementById('totalBalance').innerText = balance.toLocaleString() + " VNĐ";
        }

        async function saveData() {
            if(!isAdmin) return alert("Vui lòng đăng nhập!");
            const date = document.getElementById('date').value;
            const content = document.getElementById('content').value;
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('type').value;
            const editRowId = document.getElementById('editRowId').value;
            if(!date || !content || !amount) return alert("Vui lòng nhập đủ dữ liệu!");

            const payload = {
                action: editRowId ? "edit" : "add",
                row: editRowId,
                date: date,
                content: content,
                person: document.getElementById('person').value,
                thu: type === 'thu' ? amount : "",
                chi: type === 'chi' ? amount : ""
            };

            setLoading(true);
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            resetForm();
            document.getElementById('date').value = "";
            document.getElementById('person').value = "";
            alert("Đã lưu! Đang tải lại...");
            setTimeout(fetchData, 2000);
            setLoading(false);
        }

        async function deleteRow(rowId) {
            if (!confirm("Xóa dòng này?")) return;
            setLoading(true);
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", row: rowId }) });
            setTimeout(fetchData, 2000);
            setLoading(false);
        }

        function editRow(data) {
            const item = JSON.parse(decodeURIComponent(data));
            if (item["Ngày"]) {
                const d = new Date(item["Ngày"]);
                document.getElementById('date').value = d.toISOString().split('T')[0];
            }
            document.getElementById('editRowId').value = item.row;
            document.getElementById('content').value = item["Nội dung"];
            document.getElementById('person').value = item["Người thực hiện/Người đóng góp"];
            document.getElementById('amount').value = item["Khoản Thu"] || item["Khoản Chi"];
            document.getElementById('type').value = item["Khoản Thu"] ? "thu" : "chi";
            document.getElementById('formTitle').innerText = "Sửa Giao Dịch (Dòng " + item.row + ")";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('editRowId').value = "";
            document.getElementById('content').value = "";
            document.getElementById('amount').value = "";
            document.getElementById('formTitle').innerText = "Thêm Giao Dịch Mới";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        function setLoading(s) { document.getElementById('loading').classList.toggle('hidden', !s); }
        fetchData();
    </script>
</body>
</html>
